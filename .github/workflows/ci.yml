name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ── NestJS API Tests ─────────────────────────────────────────────────────────
  test-api:
    name: NestJS API Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: decoqo_test
          POSTGRES_USER: decoqo
          POSTGRES_PASSWORD: test_pass
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/api/package-lock.json

      - name: Install dependencies
        working-directory: apps/api
        run: npm ci

      - name: Generate Prisma client
        working-directory: apps/api
        run: npx prisma generate

      - name: Run DB migrations
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://decoqo:test_pass@localhost:5432/decoqo_test
        run: npx prisma migrate deploy

      - name: Run unit tests
        working-directory: apps/api
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://decoqo:test_pass@localhost:5432/decoqo_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-minimum-32-characters-long
          JWT_REFRESH_SECRET: test-refresh-secret-minimum-32-chars
        run: npm run test:unit -- --coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          directory: apps/api/coverage

  # ── Python Moderation Tests ───────────────────────────────────────────────────
  test-moderation:
    name: Python Moderation Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: apps/moderation/requirements.txt

      - name: Install dependencies
        working-directory: apps/moderation
        run: pip install -r requirements.txt

      - name: Download spaCy model
        run: python -m spacy download en_core_web_sm

      - name: Run tests with coverage
        working-directory: apps/moderation
        run: pytest tests/ -v --cov=app --cov-report=xml --cov-report=term

  # ── Lint ──────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install API deps
        working-directory: apps/api
        run: npm ci

      - name: Lint TypeScript
        working-directory: apps/api
        run: npm run lint

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python linting tools
        run: pip install ruff mypy

      - name: Lint Python
        working-directory: apps/moderation
        run: ruff check app/ tests/

  # ── Build Docker Images ───────────────────────────────────────────────────────
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test-api, test-moderation, lint]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t decoqo-api:${{ github.sha }} apps/api/

      - name: Build Moderation image
        run: docker build -t decoqo-moderation:${{ github.sha }} apps/moderation/
